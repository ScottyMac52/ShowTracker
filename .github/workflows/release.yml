name: Release on Tag

on:
  push:
    tags:
      - 'v*.*.*.*'
  workflow_dispatch:

jobs:
  release:
    name: Full Build + Release (on Tag)
    permissions:
      contents: write
    uses: ScottyMac52/shared-github-workflows/.github/workflows/reusable-build-and-release.yml@main
    if: startsWith(github.ref, 'refs/tags/')
    with:
      dotnet_version: '10.0.x'
      run_tests: true
      run_coverage: true
      run_build_release: true
      ci_mode: false
      create_release: true
      enable_installer: true
    secrets: inherit
    
